<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniConnect - Chat</title>
    <link rel="stylesheet" href="../styles/chat.css">
</head>
<body>
    <template id="leftMessage">
        <div class="message-container incoming">
            <div class="avatar">JD</div>
            <div class="message-content">
                <span class="sender-name">John Doe</span>
                <p class="text">Hey! Does anyone have the notes for the last Physics lecture?</p>
                <span class="time">10:15 AM</span>
            </div>
        </div>
    </template>

    <template id="rightMessage">
        <div class="message-container outgoing">
            <div class="message-content">
                <p class="text">Yeah, I just uploaded them to the Resources section. Check it out!</p>
                <span class="time">10:17 AM</span>
            </div>
        </div>
    </template>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">UniConnect</div>
            <nav>
                <ul id="menu-list">
                    <li><a href="../resources.html" class="menu-item">Resources</a></li>
                    <li><a href="announcements.html" class="menu-item">Announcements</a></li>
                    <li><a href="chat.html" class="menu-item active">Chat</a></li>
                    <li><a href="" class="menu-item">Events Planning</a></li>
                    <li><a href="" class="menu-item">Timetables</a></li>
                    <li><a href="" class="menu-item">Elections</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content-window">
            <header class="window-header">
                <h2>General Student Chat</h2>
            </header>

            <div class="chat-display">
                </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Write your message...">
                <button id="send-btn">Send</button>
            </div>
        </main>
    </div>
</body>
</html>
